<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule.io</title>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
<style>
.right-panel {
  float: right;
  width: 400px;
  margin-left: 20px;
}
.title {
  background: white;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
}
.blank-box {
  width: 100%;
  height: 400px;
  border: 2px solid black;
  background-color: white;
  box-sizing: border-box;
  display: grid;
  grid-template-rows: repeat(9, 40px);
}
.blank-box div {
  border-bottom: 1px solid black;
  display: flex;
  align-items: center;
  padding: 0 10px;
  height: 40px;
}
</style>
</head>
<body>
<h1>Schedule.io</h1>

<button onclick="handleAuthClick()">Sign In</button>
<button onclick="sendEmail()">Send Email</button>
<button onclick="createCalendarInvite()">Create Event</button>

<div class="right-panel">
  <div class="title">Leaderboard</div>
  <div class="blank-box" id="leaderboard">
    <div>Loading...</div>
  </div>
</div>

<div class="left-content">
  <br><br>
  <label for="guestEmail">Guest Email:</label>
  <input type="email" id="guestEmail" placeholder="guest@richmond.edu" />
  <br><br>
  <label for="startTime">Start Time:</label>
  <input type="datetime-local" id="startTime" />
  <br><br>
  <label for="endTime">End Time:</label>
  <input type="datetime-local" id="endTime" />
  <br><br>
  <pre id="output"></pre>

  <div>
    <br><br>
    <label for="targetEmail">Participant Name (for points):</label>
    <input type="email" id="targetEmail" placeholder="Enter Name" />
    <br><br>
    <button onclick="addPoints(5)">+5 Points</button>
    <br><br>
    <button onclick="addPoints(10)">+10 Points</button>
    <br><br>
    <button onclick="addPoints(15)">+15 Points</button>
    <br><br>
    <button onclick="deletePoints()">Delete Points</button>
    <br><br>
    <button onclick="clearLeaderboard()">Clear Leaderboard</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
